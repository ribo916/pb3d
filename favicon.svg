<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="ball" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#9bef3a"/>
      <stop offset="55%" stop-color="#4fc800"/>
      <stop offset="100%" stop-color="#357f00"/>
    </radialGradient>
  </defs>
  <!-- pickleball body -->
  <circle cx="32" cy="32" r="30" fill="url(#ball)" stroke="#2f6e00" stroke-width="1.5"/>
  <!-- holes (dark, slightly inset) arranged like a real pickleball -->
  <g fill="#28560a">
    <circle cx="32" cy="32" r="4.6"/>
    <circle cx="48" cy="32" r="4.6"/>
    <circle cx="40" cy="18.1" r="4.6"/>
    <circle cx="24" cy="18.1" r="4.6"/>
    <circle cx="16" cy="32" r="4.6"/>
    <circle cx="24" cy="45.9" r="4.6"/>
    <circle cx="40" cy="45.9" r="4.6"/>
  </g>
  <!-- glossy highlight -->
  <ellipse cx="23" cy="20" rx="9" ry="6" fill="#ffffff" opacity="0.35"/>
</svg>
